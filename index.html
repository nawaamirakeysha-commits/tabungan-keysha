<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keysha's Daily Slay & Save ✨</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        soft: {
                            pink: '#FFD1DC',
                            purple: '#E6E6FA',
                            blue: '#BFE6FF',
                            green: '#D4F0F0',
                            peach: '#FFDAB9'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            background-attachment: fixed;
            color: #334155;
        }
        
        /* Glassmorphism utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(148, 163, 184, 0.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Checkbox styling */
        .cute-checkbox:checked + div {
            background-color: #a78bfa;
            border-color: #a78bfa;
        }
        .cute-checkbox:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="antialiased font-sans pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        const App = () => {
            // --- STATE MANAGEMENT ---
            // Jadwal
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('keysha_tasks');
                return saved ? JSON.parse(saved) : [];
            });
            const [newTask, setNewTask] = useState('');
            const [newTime, setNewTime] = useState('');

            // Keuangan
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('keysha_tx');
                return saved ? JSON.parse(saved) : [];
            });
            const [amount, setAmount] = useState('');
            const [desc, setDesc] = useState('');
            const [type, setType] = useState('expense'); // 'income' or 'expense'

            // Wishlist Tabungan
            const [wishlist, setWishlist] = useState(() => {
                const saved = localStorage.getItem('keysha_wishlist');
                return saved ? JSON.parse(saved) : { name: 'Konser impian / Skincare', target: 500000 };
            });
            const [isEditingWishlist, setIsEditingWishlist] = useState(false);
            const [tempWishlistName, setTempWishlistName] = useState(wishlist.name);
            const [tempWishlistTarget, setTempWishlistTarget] = useState(wishlist.target);

            // Time Greeting
            const [greeting, setGreeting] = useState('');

            // --- EFFECTS ---
            useEffect(() => {
                localStorage.setItem('keysha_tasks', JSON.stringify(tasks));
            }, [tasks]);

            useEffect(() => {
                localStorage.setItem('keysha_tx', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('keysha_wishlist', JSON.stringify(wishlist));
            }, [wishlist]);

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour < 11) setGreeting('Good Morning');
                else if (hour < 15) setGreeting('Good Afternoon');
                else if (hour < 19) setGreeting('Good Evening');
                else setGreeting('Good Night');
            }, []);

            // --- HANDLERS JADWAL ---
            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.trim()) return;
                const task = {
                    id: Date.now(),
                    text: newTask,
                    time: newTime || 'Anytime',
                    done: false
                };
                setTasks([...tasks, task].sort((a, b) => a.time.localeCompare(b.time)));
                setNewTask('');
                setNewTime('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            // --- HANDLERS KEUANGAN ---
            const addTransaction = (e) => {
                e.preventDefault();
                if (!amount || !desc) return;
                const tx = {
                    id: Date.now(),
                    amount: parseInt(amount),
                    desc,
                    type,
                    date: new Date().toLocaleDateString('id-ID')
                };
                setTransactions([tx, ...transactions]);
                setAmount('');
                setDesc('');
            };

            const deleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const saveWishlist = () => {
                setWishlist({ name: tempWishlistName, target: parseInt(tempWishlistTarget) || 0 });
                setIsEditingWishlist(false);
            };

            // --- CALCULATIONS ---
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + curr.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + curr.amount, 0);
            const balance = totalIncome - totalExpense;
            const progress = wishlist.target > 0 ? Math.min((Math.max(balance, 0) / wishlist.target) * 100, 100) : 0;

            const completedTasks = tasks.filter(t => t.done).length;
            const totalTasks = tasks.length;

            return (
                <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
                    {/* Header Section */}
                    <div className="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <p className="text-gray-500 font-medium mb-1 text-sm uppercase tracking-wider">{greeting}, slay the day! 💅</p>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-fuchsia-500">
                                Hi, Keysha! ✨
                            </h1>
                        </div>
                        <div className="glass-card px-6 py-3 rounded-full flex gap-4 text-sm font-semibold text-gray-600">
                            <div className="flex items-center gap-2">
                                <i className="ph-fill ph-calendar-check text-violet-500 text-xl"></i>
                                {new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' })}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
                        
                        {/* LEFT COLUMN - JADWAL HARIAN */}
                        <div className="md:col-span-5 flex flex-col gap-6">
                            
                            {/* Planner Card */}
                            <div className="glass-card rounded-3xl p-6 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-soft-purple rounded-full blur-3xl -mr-10 -mt-10 opacity-60"></div>
                                
                                <div className="flex justify-between items-center mb-6 relative z-10">
                                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                        <i className="ph-duotone ph-list-dashes text-2xl text-purple-500"></i>
                                        Jadwal Hari Ini
                                    </h2>
                                    <span className="bg-white/80 text-purple-600 text-xs px-3 py-1 rounded-full font-bold">
                                        {completedTasks}/{totalTasks} Selesai
                                    </span>
                                </div>

                                {/* Form Add Task */}
                                <form onSubmit={addTask} className="flex gap-2 mb-6 relative z-10">
                                    <input 
                                        type="time" 
                                        value={newTime}
                                        onChange={(e) => setNewTime(e.target.value)}
                                        className="bg-white/50 border border-purple-100 text-sm rounded-2xl px-3 py-2 outline-none focus:ring-2 focus:ring-purple-300 w-24"
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Mau ngapain bestie?" 
                                        value={newTask}
                                        onChange={(e) => setNewTask(e.target.value)}
                                        className="bg-white/50 border border-purple-100 text-sm rounded-2xl px-4 py-2 outline-none focus:ring-2 focus:ring-purple-300 flex-1"
                                    />
                                    <button type="submit" className="bg-purple-500 hover:bg-purple-600 text-white rounded-2xl p-2 transition-transform hover:scale-105">
                                        <i className="ph-bold ph-plus text-xl"></i>
                                    </button>
                                </form>

                                {/* Task List */}
                                <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 relative z-10">
                                    {tasks.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400 text-sm">
                                            <i className="ph-duotone ph-coffee text-4xl mb-2 block text-gray-300"></i>
                                            Belum ada agenda.<br/>Waktunya healing atau nugas?
                                        </div>
                                    ) : (
                                        tasks.map(task => (
                                            <div key={task.id} className={`flex items-center justify-between p-3 rounded-2xl border transition-all ${task.done ? 'bg-gray-50/50 border-gray-100 opacity-60' : 'bg-white border-purple-50 hover:border-purple-200 shadow-sm'}`}>
                                                <label className="flex items-center gap-3 cursor-pointer flex-1">
                                                    <div className="relative flex items-center justify-center">
                                                        <input type="checkbox" className="cute-checkbox sr-only" checked={task.done} onChange={() => toggleTask(task.id)} />
                                                        <div className="w-5 h-5 border-2 border-gray-300 rounded-md flex items-center justify-center transition-colors">
                                                            <svg className="w-3 h-3 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"></path></svg>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <p className={`text-sm font-semibold ${task.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>{task.text}</p>
                                                        <p className="text-xs text-purple-400 font-medium flex items-center gap-1 mt-0.5">
                                                            <i className="ph-fill ph-clock text-xs"></i> {task.time}
                                                        </p>
                                                    </div>
                                                </label>
                                                <button onClick={() => deleteTask(task.id)} className="text-gray-300 hover:text-red-400 p-2 transition-colors">
                                                    <i className="ph-fill ph-trash text-lg"></i>
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN - KEUANGAN */}
                        <div className="md:col-span-7 flex flex-col gap-6">
                            
                            {/* Dashboard Keuangan Top */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {/* Saldo Card */}
                                <div className="glass-card rounded-3xl p-6 relative overflow-hidden bg-gradient-to-br from-violet-500 to-fuchsia-500 text-white shadow-lg shadow-purple-200">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-white rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
                                    <div className="relative z-10">
                                        <p className="text-purple-100 text-sm font-medium mb-1">Total Saldo Saat Ini</p>
                                        <h3 className="text-3xl font-extrabold mb-4">{formatRupiah(balance)}</h3>
                                        <div className="flex gap-4 text-xs font-medium">
                                            <div className="bg-white/20 px-3 py-1.5 rounded-xl flex items-center gap-1 backdrop-blur-sm">
                                                <i className="ph-bold ph-arrow-down-left text-green-300"></i>
                                                {formatRupiah(totalIncome)}
                                            </div>
                                            <div className="bg-white/20 px-3 py-1.5 rounded-xl flex items-center gap-1 backdrop-blur-sm">
                                                <i className="ph-bold ph-arrow-up-right text-red-300"></i>
                                                {formatRupiah(totalExpense)}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Wishlist Progress */}
                                <div className="glass-card rounded-3xl p-6 relative">
                                    <div className="flex justify-between items-start mb-2">
                                        <p className="text-sm font-bold text-gray-700 flex items-center gap-1">
                                            <i className="ph-fill ph-target text-pink-500"></i> Target Nabung
                                        </p>
                                        <button onClick={() => setIsEditingWishlist(!isEditingWishlist)} className="text-gray-400 hover:text-pink-500 transition">
                                            <i className="ph-fill ph-pencil-simple text-lg"></i>
                                        </button>
                                    </div>

                                    {isEditingWishlist ? (
                                        <div className="mt-3 space-y-2">
                                            <input type="text" value={tempWishlistName} onChange={e => setTempWishlistName(e.target.value)} placeholder="Target nabung untuk..." className="w-full text-xs p-2 rounded-xl border border-pink-100 bg-white/50 outline-none focus:border-pink-300" />
                                            <input type="number" value={tempWishlistTarget} onChange={e => setTempWishlistTarget(e.target.value)} placeholder="Nominal Rp..." className="w-full text-xs p-2 rounded-xl border border-pink-100 bg-white/50 outline-none focus:border-pink-300" />
                                            <button onClick={saveWishlist} className="w-full bg-pink-400 text-white text-xs font-bold py-2 rounded-xl hover:bg-pink-500">Simpan Target</button>
                                        </div>
                                    ) : (
                                        <div className="mt-2">
                                            <h4 className="font-bold text-gray-800 text-lg line-clamp-1">{wishlist.name}</h4>
                                            <p className="text-xs text-gray-500 mb-3">{formatRupiah(wishlist.target)}</p>
                                            
                                            {/* Progress Bar */}
                                            <div className="w-full bg-pink-100 rounded-full h-3.5 mb-1 overflow-hidden relative">
                                                <div className="bg-gradient-to-r from-pink-400 to-rose-400 h-3.5 rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div>
                                                {progress >= 100 && (
                                                    <div className="absolute inset-0 flex items-center justify-center text-[10px] text-white font-bold tracking-widest drop-shadow-md">TARGET ACHIEVED 🎉</div>
                                                )}
                                            </div>
                                            <p className="text-right text-[10px] font-bold text-pink-500 mt-1">{progress.toFixed(1)}% Terkumpul</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Form Input & Riwayat Card */}
                            <div className="glass-card rounded-3xl p-6 flex-1 flex flex-col">
                                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2 mb-4">
                                    <i className="ph-duotone ph-wallet text-2xl text-teal-500"></i>
                                    Track Keuangan
                                </h2>

                                {/* Input Transaksi */}
                                <form onSubmit={addTransaction} className="flex flex-wrap gap-3 mb-6 bg-white/40 p-3 rounded-2xl border border-teal-50/50">
                                    <div className="flex gap-2 w-full md:w-auto flex-1">
                                        <select 
                                            value={type} 
                                            onChange={e => setType(e.target.value)}
                                            className={`text-sm rounded-xl px-3 py-2 outline-none font-semibold ${type === 'income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}
                                        >
                                            <option value="expense">Keluar 💸</option>
                                            <option value="income">Masuk 🤑</option>
                                        </select>
                                        <input 
                                            type="number" 
                                            placeholder="Nominal..." 
                                            value={amount}
                                            onChange={e => setAmount(e.target.value)}
                                            className="bg-white border border-gray-100 text-sm rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-teal-300 flex-1 min-w-[100px]"
                                        />
                                    </div>
                                    <div className="flex gap-2 w-full md:w-auto flex-1">
                                        <input 
                                            type="text" 
                                            placeholder="Buat apa nih?" 
                                            value={desc}
                                            onChange={e => setDesc(e.target.value)}
                                            className="bg-white border border-gray-100 text-sm rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-teal-300 flex-1"
                                        />
                                        <button type="submit" className="bg-teal-400 hover:bg-teal-500 text-white font-bold rounded-xl px-4 py-2 transition-transform hover:scale-105 whitespace-nowrap">
                                            Catat
                                        </button>
                                    </div>
                                </form>

                                {/* Riwayat List */}
                                <div className="space-y-3 overflow-y-auto max-h-[300px] pr-2">
                                    {transactions.length === 0 ? (
                                        <div className="text-center py-8 text-gray-400 text-sm">
                                            <i className="ph-duotone ph-receipt text-4xl mb-2 block text-gray-300"></i>
                                            Belum ada catatan keuangan.<br/>Hemat pangkal kaya!
                                        </div>
                                    ) : (
                                        transactions.map(tx => (
                                            <div key={tx.id} className="flex items-center justify-between p-3 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${tx.type === 'income' ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`}>
                                                        <i className={`ph-bold ${tx.type === 'income' ? 'ph-arrow-down-left' : 'ph-arrow-up-right'} text-xl`}></i>
                                                    </div>
                                                    <div>
                                                        <p className="text-sm font-bold text-gray-800">{tx.desc}</p>
                                                        <p className="text-[10px] text-gray-400">{tx.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <p className={`font-bold text-sm ${tx.type === 'income' ? 'text-green-500' : 'text-red-500'}`}>
                                                        {tx.type === 'income' ? '+' : '-'}{formatRupiah(tx.amount)}
                                                    </p>
                                                    <button onClick={() => deleteTransaction(tx.id)} className="text-gray-300 hover:text-red-400 transition-colors">
                                                        <i className="ph-fill ph-x-circle text-lg"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
